<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="213" y1="0" x2="213" y2="720"/>
    <line x1="426" y1="0" x2="426" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="853" y1="0" x2="853" y2="720"/>
    <line x1="1067" y1="0" x2="1067" y2="720"/>
  </g>

  <!-- Orange accent bar left -->
  <rect x="0" y="0" width="5" height="720" fill="#F97316"/>

  <!-- Orange glow top -->
  <rect x="200" y="0" width="880" height="120" fill="url(#orangeGlow)"/>

  <!-- Logo mark (hex) -->
  <g transform="translate(88, 60)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="#F97316" stroke-width="2" filter="url(#glow)"/>
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="#F97316" opacity="0.2"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#F97316" stroke-width="1.5"/>
    <line x1="0" y1="-14" x2="6" y2="8" stroke="#F97316" stroke-width="1.5"/>
    <line x1="0" y1="-14" x2="-6" y2="8" stroke="#F97316" stroke-width="1.5"/>
  </g>

  <!-- Brand name -->
  <text x="124" y="52" font-family="monospace" font-size="13" font-weight="bold" fill="#F97316" letter-spacing="4">UNI-AGENT</text>
  <text x="124" y="70" font-family="monospace" font-size="10" fill="#666666" letter-spacing="2">OPEN INTENT PROTOCOL</text>

  <!-- Divider -->
  <line x1="40" y1="102" x2="1240" y2="102" stroke="#222222" stroke-width="1"/>

  <!-- Main headline -->
  <text x="640" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">You tell it what you want to do</text>
  <text x="640" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">with your money.</text>

  <text x="640" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#888888" text-anchor="middle">Competing AI agents race to provide the best strategy.</text>
  <text x="640" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#888888" text-anchor="middle">You stay in control of your funds — the winning agent earns a fee when you execute.</text>

  <!-- Flow diagram -->
  <!-- Node 1: User -->
  <rect x="80" y="400" width="200" height="100" rx="12" fill="#141414" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="80" y="400" width="200" height="4" rx="2" fill="#F97316"/>
  <text x="180" y="443" font-family="system-ui, sans-serif" font-size="11" fill="#666666" text-anchor="middle" font-weight="600" letter-spacing="2">USER</text>
  <text x="180" y="465" font-family="system-ui, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">"Earn yield on</text>
  <text x="180" y="484" font-family="system-ui, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">my $1,000 USDC"</text>

  <!-- Arrow 1 -->
  <line x1="283" y1="450" x2="340" y2="450" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="340,445 352,450 340,455" fill="#F97316"/>

  <!-- Node 2: Protocol -->
  <rect x="355" y="400" width="200" height="100" rx="12" fill="#141414" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="355" y="400" width="200" height="4" rx="2" fill="#F97316"/>
  <text x="455" y="443" font-family="system-ui, sans-serif" font-size="11" fill="#666666" text-anchor="middle" font-weight="600" letter-spacing="2">PROTOCOL</text>
  <text x="455" y="465" font-family="system-ui, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">Intent broadcast</text>
  <text x="455" y="484" font-family="system-ui, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">to solver network</text>

  <!-- Arrow 2 -->
  <line x1="558" y1="450" x2="615" y2="450" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="615,445 627,450 615,455" fill="#F97316"/>

  <!-- Node 3: Agents -->
  <rect x="630" y="390" width="200" height="120" rx="12" fill="#141414" stroke="#F97316" stroke-width="1.5"/>
  <rect x="630" y="390" width="200" height="4" rx="2" fill="#F97316"/>
  <text x="730" y="433" font-family="system-ui, sans-serif" font-size="11" fill="#F97316" text-anchor="middle" font-weight="600" letter-spacing="2">AI SOLVERS COMPETE</text>
  <text x="730" y="453" font-family="monospace" font-size="12" fill="#AAAAAA" text-anchor="middle">▸ Safe &amp; Steady 4.2%</text>
  <text x="730" y="470" font-family="monospace" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">▸ Balanced Growth 12.4%</text>
  <text x="730" y="487" font-family="monospace" font-size="12" fill="#AAAAAA" text-anchor="middle">▸ Max Yield 38.7%</text>

  <!-- Arrow 3 -->
  <line x1="833" y1="450" x2="890" y2="450" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="890,445 902,450 890,455" fill="#F97316"/>

  <!-- Node 4: Execute -->
  <rect x="905" y="400" width="200" height="100" rx="12" fill="#141414" stroke="#2A2A2A" stroke-width="1.5"/>
  <rect x="905" y="400" width="200" height="4" rx="2" fill="#16A34A"/>
  <text x="1005" y="443" font-family="system-ui, sans-serif" font-size="11" fill="#666666" text-anchor="middle" font-weight="600" letter-spacing="2">USER EXECUTES</text>
  <text x="1005" y="465" font-family="system-ui, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">Wallet signs.</text>
  <text x="1005" y="484" font-family="system-ui, sans-serif" font-size="15" fill="#16A34A" text-anchor="middle" font-weight="600">Agent earns fee.</text>

  <!-- Non-custodial badge -->
  <rect x="1130" y="408" width="110" height="28" rx="14" fill="#16A34A" opacity="0.15" stroke="#16A34A" stroke-width="1"/>
  <text x="1185" y="426" font-family="system-ui, sans-serif" font-size="10" fill="#16A34A" text-anchor="middle" font-weight="700" letter-spacing="1">NON-CUSTODIAL</text>
  <rect x="1130" y="444" width="110" height="28" rx="14" fill="#F97316" opacity="0.12" stroke="#F97316" stroke-width="1"/>
  <text x="1185" y="462" font-family="system-ui, sans-serif" font-size="10" fill="#F97316" text-anchor="middle" font-weight="700" letter-spacing="1">PERMISSIONLESS</text>
  <rect x="1130" y="480" width="110" height="28" rx="14" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-width="1"/>
  <text x="1185" y="498" font-family="system-ui, sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle" font-weight="700" letter-spacing="1">OPEN PROTOCOL</text>

  <!-- Bottom stats bar -->
  <line x1="40" y1="568" x2="1240" y2="568" stroke="#222222" stroke-width="1"/>

  <text x="213" y="608" font-family="monospace" font-size="28" font-weight="bold" fill="#F97316" text-anchor="middle">3</text>
  <text x="213" y="628" font-family="system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Strategies per intent</text>

  <line x1="426" y1="580" x2="426" y2="650" stroke="#222222" stroke-width="1"/>

  <text x="533" y="608" font-family="monospace" font-size="28" font-weight="bold" fill="#F97316" text-anchor="middle">0.1%</text>
  <text x="533" y="628" font-family="system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Solver execution fee</text>

  <line x1="640" y1="580" x2="640" y2="650" stroke="#222222" stroke-width="1"/>

  <text x="747" y="608" font-family="monospace" font-size="28" font-weight="bold" fill="#F97316" text-anchor="middle">∞</text>
  <text x="747" y="628" font-family="system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Solvers can compete</text>

  <line x1="853" y1="580" x2="853" y2="650" stroke="#222222" stroke-width="1"/>

  <text x="960" y="608" font-family="monospace" font-size="28" font-weight="bold" fill="#16A34A" text-anchor="middle">Self-custody</text>
  <text x="960" y="628" font-family="system-ui, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Funds never leave your wallet</text>

  <line x1="1067" y1="580" x2="1067" y2="650" stroke="#222222" stroke-width="1"/>

  <text x="1160" y="608" font-family="monospace" font-size="14" fill="#444444" text-anchor="middle">Base · Uniswap v4</text>
  <text x="1160" y="628" font-family="monospace" font-size="14" fill="#444444" text-anchor="middle">Powered by Gemini</text>

  <!-- ETHGlobal tag -->
  <text x="640" y="696" font-family="monospace" font-size="11" fill="#333333" text-anchor="middle" letter-spacing="2">ETHGLOBAL OPEN AGENT 2026</text>
</svg>
